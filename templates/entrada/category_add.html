{% extends "users/base_users.html" %}
{% load static %}

{% block content %}

{% include "includes/header.html" %}

<style>
    .card-header {
        background-color: #007bff !important;
        color: white !important;
    }

    .form-card {
        border-radius: 8px;
        box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .form-label {
        font-weight: 600;
        color: #495057;
    }

    .form-control:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
    }

    .btn-guardar {
        background-color: #007bff;
        border-color: #007bff;
        color: white;
        font-weight: 600;
        padding: 8px 24px;
    }

    .btn-guardar:hover {
        background-color: #0069d9;
        border-color: #0062cc;
    }

    .btn-cancelar {
        font-weight: 600;
        padding: 8px 24px;
    }
</style>

<div class="container" style="min-height: 637px; padding: 10px 0;">
    <div class="row">
        <div class="col-12">

            <!-- Card Header Principal -->
            <div class="row justify-content-center mb-2">
                <div class="col-md-6">
                    <div class="card-header">
                        <h3 class="mb-0 text-center">
                            <i class="fas fa-plus mr-2"></i>
                            Agregar Categoría
                        </h3>
                    </div>
                </div>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card form-card">
                        <div class="card-body">

                            <form method="POST" action="">
                                {% csrf_token %}

                                <!-- Nombre Corto -->
                                <div class="form-group mb-3">
                                    <label class="form-label" for="short_name">
                                        <i class="fas fa-tag mr-1 text-primary"></i> Nombre Corto
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="short_name"
                                           name="short_name"
                                           required>
                                </div>

                                <!-- Nombre -->
                                <div class="form-group mb-4">
                                    <label class="form-label" for="name">
                                        <i class="fas fa-font mr-1 text-primary"></i> Nombre
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="name"
                                           name="name"

                                           required>
                                </div>

                                <!-- Botones -->
                                <div class="d-flex justify-content-end">
                                    <a href="" class="btn btn-secondary btn-cancelar mr-2">
                                        <i class="fas fa-times mr-1"></i> Cancelar
                                    </a>
                                    <button type="submit" class="btn btn-guardar">
                                        <i class="fas fa-save mr-1"></i> Guardar
                                    </button>
                                </div>

                            </form>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock content %}
