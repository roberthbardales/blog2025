{% load static %}
<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="48x48" href="{% static 'img/favicon.ico' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
  <link rel="stylesheet" href="{% static 'js/atom-one-dark-reasonable.min.css' %}">
  <script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/10.0.3/highlight.min.js"></script>
  <script>hljs.initHighlightingOnLoad();</script>
  <script src="https://unpkg.com/scrollreveal"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary-300': '#93c5fd',
            'primary-500': '#0d6efd',
            'primary-600': '#0b5ed7',
            'primary-700': '#1e40af',
            'primary-900': '#084298',
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <title>{% block title %}{% endblock title %}</title>

  {% block description %}{% endblock description %}
  {% block tags %}{% endblock tags %}
  {% block css %}{% endblock css %}
</head>
<body class="bg-slate-50 font-inter min-h-screen flex flex-col">

<div class="w-full pt-10 flex-1">
  {% block content %}{% endblock content %}
</div>

<style>
  html { scrollbar-gutter: stable; }
  .footer-before {
    position: absolute;
    inset: auto -10% -55% auto;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    pointer-events: none;
  }
  .heart-icon {
    color: #ff6b6b;
    animation: heartbeat 1.5s infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.1); }
  }
</style>



{% block js %}{% endblock js %}

{% include "includes/whatsapp_float.html" %}

</body>
</html>
