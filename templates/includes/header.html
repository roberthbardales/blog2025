{% load static %}

<nav class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-r from-primary-600 via-primary-500 to-primary-900 shadow-[0_10px_30px_rgba(0,0,0,0.12)]">
  <div class="flex lg:hidden items-center justify-end px-4 py-2">
    <button id="navToggle" class="text-white text-2xl focus:outline-none" aria-label="Toggle navigation">
      <i class="fas fa-bars"></i>
    </button>
  </div>

  <div id="navMenu" class="hidden lg:flex lg:items-center lg:justify-center flex-col lg:flex-row px-4 pb-4 lg:px-8 lg:py-2">
    <div class="flex items-center gap-2 flex-col lg:flex-row">
      <a class="flex items-center" href="{% url 'home_app:index' %}">
        <img class="h-7 w-10 rounded-lg object-cover" src="{% static 'img/logo2.jpg' %}" alt="Logo del sitio">
      </a>
      <ul class="flex flex-col lg:flex-row lg:items-center gap-1">
        <li>
          <a class="inline-block border border-white/20 text-white rounded-lg px-4 py-2 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:bg-[#198754] hover:border-[#198754]" href="{% url 'home_app:index' %}">Inicio</a>
        </li>
        <li>
          <a class="inline-block border border-white/20 text-white rounded-lg px-4 py-2 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:bg-[#198754] hover:border-[#198754]" href="{% url 'home_app:portafolio' %}">Proyectos</a>
        </li>
        <li>
          <a class="inline-block border border-white/20 text-white rounded-lg px-4 py-2 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:bg-[#198754] hover:border-[#198754]" href="{% url 'home_app:sobre_mi' %}">Sobre mí</a>
        </li>
        <li>
          <a class="inline-block border border-white/20 text-white rounded-lg px-4 py-2 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:bg-[#198754] hover:border-[#198754]" href="{% url 'entrada_app:entry-lista' %}">Blog</a>
        </li>
      </ul>
      <form method="get" action="{% url 'entrada_app:entry-lista' %}" class="flex items-center gap-2">
        {% csrf_token %}
        <input class="rounded-lg border-none px-3 py-1.5 min-w-[170px] focus:outline-none focus:ring-2 focus:ring-white/30" id="kword_general" name="kword_general" type="search" placeholder="Buscar..." aria-label="Buscar" value="{{ request.GET.kword_general }}">
        <button class="bg-gray-900 text-white rounded-lg px-3 py-1.5 hover:bg-gray-800 transition-colors" type="submit">Buscar</button>
      </form>
      {% if not user.is_anonymous %}
      <a href="{% url 'amigos_app:perfil' %}" class="flex items-center p-0">
        {% if user.avatar %}
          <img src="{{ user.avatar.url }}" alt="Avatar de {{ user.name }}" class="w-11 h-11 rounded-full object-cover border-2 border-white/30 transition-all duration-200 hover:scale-110 hover:shadow-[0_0_0_0.2rem_rgba(255,255,255,0.25)]">
        {% elif user.avatar_url %}
          <img src="{{ user.avatar_url }}" alt="Avatar de {{ user.name }}" class="w-11 h-11 rounded-full object-cover border-2 border-white/30 transition-all duration-200 hover:scale-110 hover:shadow-[0_0_0_0.2rem_rgba(255,255,255,0.25)]">
        {% else %}
          <span class="bg-yellow-400 text-dark rounded-lg px-4 py-2">Perfil</span>
        {% endif %}
      </a>
      <a href="{% url 'users_app:user-logout' %}" class="inline-block bg-red-600 text-white rounded-lg px-4 py-2 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg">Salir</a>
      <a class="text-white font-bold" href="{% url 'favoritos_app:perfil' %}">{{ user.name }}</a>
      {% else %}
      <a href="{% url 'users_app:user-login' %}" class="inline-block bg-white/10 border border-white/30 text-white rounded-lg px-4 py-2 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:bg-[#198754] hover:border-[#198754]">Iniciar sesión</a>
      {% endif %}
    </div>
  </div>
</nav>

<script>
  (function() {
    var toggle = document.getElementById('navToggle');
    var menu = document.getElementById('navMenu');
    toggle.addEventListener('click', function() {
      menu.classList.toggle('hidden');
    });
  })();
</script>
