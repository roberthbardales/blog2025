<style>
  .contact-section {
    width: min(1100px, calc(100% - 2rem));
    margin: 2rem auto 0;
  }

  .contact-card {
    border: none;
    border-radius: 1rem;
    overflow: hidden;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
  }

  .contact-card .card-header {
    background: linear-gradient(90deg, #0d6efd 0%, #0b5ed7 100%) !important;
    border-bottom: 0;
    padding: 1rem 1.25rem;
  }

  .contact-card .card-body {
    background: #ffffff;
  }

  .contact-icon {
    color: #0d6efd;
    width: 22px;
    margin-right: 0.5rem;
  }

  .contact-card .form-control {
    border-radius: 0.85rem;
  }

  .contact-card .form-control:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
  }

  .info-item {
    padding: 1rem;
    border-left: 4px solid #0d6efd;
    border-radius: 0.75rem;
    margin-bottom: 1rem;
    background: linear-gradient(180deg, #f8f9fa 0%, #ffffff 100%);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .info-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
  }

  .contact-card .btn-primary {
    border-radius: 999px;
    padding: 0.8rem 1.2rem;
  }
</style>

<section class="contact-section">
  <div class="row">
    <div class="col-md-11 offset-md-1">
      <div class="row">
        <div class="col-lg-7 mb-4">
          <div class="card contact-card">
            <div class="card-header text-white">
              <h4 class="mb-0">Envía un mensaje</h4>
            </div>
            <div class="card-body">
              <form method="post" action="{% url 'home_app:add-contact2' %}">
                {% csrf_token %}

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <label for="id_full_name" class="font-weight-bold">
                        <i class="fas fa-user contact-icon"></i>Nombres
                      </label>
                      <input type="text" name="full_name" id="id_full_name" class="form-control" placeholder="Escribe tu nombre" required>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="form-group">
                      <label for="id_email" class="font-weight-bold">
                        <i class="fas fa-envelope contact-icon"></i>Correo electrónico
                      </label>
                      <input type="email" name="email" id="id_email" class="form-control" placeholder="correo@ejemplo.com" required>
                    </div>
                  </div>
                </div>

                <div class="form-group">
                  <label for="id_messagge" class="font-weight-bold">
                    <i class="fas fa-comment-dots contact-icon"></i>Mensaje
                  </label>
                  <textarea class="form-control" name="messagge" id="id_messagge" rows="4" placeholder="Escribe aquí..." required></textarea>
                </div>

                <div class="form-group mb-0">
                  <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <i class="fas fa-paper-plane mr-2"></i>Enviar mensaje
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-4 mb-4">
          <div class="card contact-card">
            <div class="card-header text-white">
              <h4 class="mb-0">Información de contacto</h4>
            </div>
            <div class="card-body">
              <div class="info-item">
                <h5 class="text-primary mb-2">
                  <i class="fas fa-envelope contact-icon"></i>Email
                </h5>
                <p class="text-secondary mb-0">{{ correo }}</p>
              </div>

              <div class="info-item">
                <h5 class="text-primary mb-2">
                  <i class="fas fa-phone contact-icon"></i>Teléfono
                </h5>
                <p class="text-secondary mb-0">{{ phone }}</p>
              </div>

              <div class="info-item mb-0">
                <h5 class="text-primary mb-2">
                  <i class="fas fa-map-marker-alt contact-icon"></i>Ubicación
                </h5>
                <p class="text-secondary mb-0">Lima, Perú</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
