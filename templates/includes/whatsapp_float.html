<style>
  @keyframes wa-ripple {
    0% { transform: scale(1); opacity: .6; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  @keyframes wa-badge-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .7; transform: scale(1.15); }
  }
  .wa-ripple { animation: wa-ripple 2s ease-out infinite; }
  .wa-pulse { animation: wa-badge-pulse 1.5s ease-in-out infinite; }
  .wa-menu.show { display: flex; animation: wa-slide-up .25s ease-out; }
  @keyframes wa-slide-up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 576px) {
    #waContainer { bottom: 18px; right: 18px; }
    #waToggle { width: 52px; height: 52px; }

    .wa-menu a { font-size: .82rem; padding: 8px 14px; }
  }
</style>

<script>
  (function() {
    var container = document.getElementById('waContainer');
    var toggle = document.getElementById('waToggle');
    var menu = document.getElementById('waMenu');

    toggle.addEventListener('click', function(e) {
      e.stopPropagation();
      menu.classList.toggle('hidden');
      menu.classList.toggle('flex');
      menu.classList.toggle('show');
    });

    document.addEventListener('click', function(e) {
      if (!container.contains(e.target)) {
        menu.classList.add('hidden');
        menu.classList.remove('flex', 'show');
      }
    });
  })();
</script>
