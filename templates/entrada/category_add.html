{% extends "users/base_users.html" %}
{% load static %}

{% block content %}

{% include "includes/header.html" %}

<div class="mx-auto flex max-w-6xl flex-col lg:flex-row gap-6 px-4">
  {% include "includes/barra_lateral.html" %}

  <div class="w-full lg:flex-1 py-4">
    <section class="overflow-hidden rounded-3xl bg-gradient-to-br from-slate-950 via-blue-900 to-blue-700 text-white shadow-[0_18px_36px_rgba(15,23,42,.18)] mb-4">
      <div class="p-5 sm:p-6">
        <span class="inline-flex items-center rounded-full bg-white/15 px-3 py-1 text-xs font-semibold text-white/95">
          <i class="fas fa-folder-plus mr-1"></i>Categorías
        </span>
        <h1 class="mt-3 text-2xl font-bold">Agregar Categoría</h1>
      </div>
    </section>

    <section class="mx-auto max-w-2xl overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
      <div class="p-6 sm:p-8">
        <form method="POST" action="" class="space-y-5">
          {% csrf_token %}

          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700" for="short_name">
              <i class="fas fa-tag mr-2 text-blue-600"></i>Nombre Corto
            </label>
            <input type="text" id="short_name" name="short_name" required
                   class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
          </div>

          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700" for="name">
              <i class="fas fa-pen-nib mr-2 text-blue-600"></i>Nombre
            </label>
            <input type="text" id="name" name="name" required
                   class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
          </div>

          <div class="flex justify-end gap-2 pt-2">
            <a href="{% url 'entrada_app:categorias-lista' %}" class="inline-flex items-center justify-center rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:border-slate-400 hover:bg-slate-50">
              <i class="fas fa-times mr-2"></i>Cancelar
            </a>
            <button type="submit" class="inline-flex items-center justify-center rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700">
              <i class="fas fa-save mr-2"></i>Guardar
            </button>
          </div>
        </form>
      </div>
    </section>
  </div>
</div>

{% endblock content %}
