{% extends "users/base_users.html" %}
{% load static %}

{% block content %}

{% include "includes/header.html" %}

<style>
    body {
        background: linear-gradient(180deg, #f4f7fb 0%, #eef3f8 100%);
    }

    .chat-shell {
        min-height: calc(100vh - 180px);
    }

    .chat-container {
        max-width: 550px;
        margin: 0 auto;
    }

    .users-card {
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 12px 30px rgba(0,0,0,.08);
        border: 0;
    }

    .users-card .card-header {
        background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%) !important;
    }

    .users-list {
        max-height: calc(100vh - 260px);
        overflow-y: auto;
        min-height: 300px;
        background: #fff;
    }

    .users-list::-webkit-scrollbar {
        width: 8px;
    }

    .users-list::-webkit-scrollbar-track {
        background: #eef2f7;
    }

    .users-list::-webkit-scrollbar-thumb {
        background: #b8c5d6;
        border-radius: 999px;
    }

    .user-item {
        transition: transform .2s ease, background-color .2s ease, box-shadow .2s ease, padding-left .2s ease;
    }

    .user-item:hover {
        background: #f8f9fa;
        transform: translateX(4px);
        box-shadow: inset 3px 0 0 rgba(13, 110, 253, .25);
        padding-left: 1.1rem;
    }

    .status-badge {
        border-radius: 999px;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        animation: pulse 2s infinite;
    }

    .status-dot.online { background-color: #28a745; }
    .status-dot.offline { background-color: #dc3545; animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

    .empty-users {
        background: linear-gradient(180deg, #ffffff 0%, #f9fbfe 100%);
    }

    .users-toolbar {
        border: 0;
        border-radius: 18px;
        box-shadow: 0 12px 30px rgba(0,0,0,.06);
        overflow: hidden;
    }

    .users-toolbar .card-body {
        padding: 1rem 1rem .95rem;
    }

    .toolbar-search .form-control {
        border-radius: 999px 0 0 999px;
        border: 1px solid #cbd5e1;
    }

    .toolbar-search .btn {
        border-radius: 0 999px 999px 0;
    }

    .toolbar-chip {
        border-radius: 999px;
        padding: .45rem .85rem;
    }
</style>

<!-- Barra lateral -->
{% include "includes/barra_lateral.html" %}

<!-- Contenido principal del chat -->
<div class="col-lg-9 col-md-12 chat-shell">
    <div class="chat-container">
        <div class="card users-toolbar mb-3">
            <div class="card-body">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center" style="gap: .75rem;">
                    <div class="btn-group" role="group" aria-label="Filtros de usuarios">
                        <!-- <button type="button" class="btn btn-outline-primary active toolbar-chip" data-filter="all">
                            <i class="fas fa-users mr-1"></i>Todos
                        </button> -->
                        <button type="button" class="btn btn-outline-success toolbar-chip" data-filter="online">
                            <i class="fas fa-circle mr-1"></i>En línea
                        </button>
                        <button type="button" class="btn btn-outline-secondary toolbar-chip" data-filter="offline">
                            <i class="fas fa-user-clock mr-1"></i>Offline
                        </button>
                    </div>

                    <form class="w-100" style="max-width: 200px;" onsubmit="return false;">
                        <div class="input-group toolbar-search">
                            <input type="text"
                                   class="form-control"
                                   placeholder="Buscar..."
                                   id="userSearchInput"
                                   autocomplete="off">
                            <div class="input-group-append">
                                <button class="btn btn-primary" type="button" id="clearSearchBtn">
                                    <i class="fas fa-times mr-1"></i>Limpiar
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="card users-card">
            <div class="card-header bg-primary text-white px-3 py-3 border-0 d-flex justify-content-between align-items-center">
                <div>
                    <h3 class="h5 mb-0"><i class="fas fa-users mr-2"></i>Usuarios</h3>
                    <small class="text-white-50">Selecciona con quién quieres conversar</small>
                </div>
                <span class="badge badge-light text-primary px-3 py-2">Chat activo</span>
            </div>
            <div class="users-list">
                <ul class="list-group list-group-flush" id="usersList">
                    <!-- Los usuarios se cargarán aquí con JavaScript -->
                </ul>
            </div>
        </div>
    </div>
</div>

</div>
</div>

<script>
    // Datos iniciales de usuarios desde el backend
    const usersData = {
        {% for u in users %}
        {% if u.id != user.id %}
        {{ u.id }}: {
            id: {{ u.id }},
            name: "{{ u.full_name }}",
            initial: "{{ u.full_name|slice:':1'|upper }}",
            avatarUrl: "{% if u.avatar %}{{ u.avatar.url }}{% elif u.avatar_url %}{{ u.avatar_url }}{% endif %}",
            isOnline: {% if u.is_online %}true{% else %}false{% endif %}
        },
        {% endif %}
        {% endfor %}
    };

    let currentFilter = 'all';

    function updateUserStatus(userId, isOnline) {
        const userItem = document.getElementById(`user-item-${userId}`);
        const statusBadge = document.getElementById(`status-${userId}`);
        if (!userItem || !statusBadge) return;

        if (isOnline) {
            userItem.classList.remove('offline');
            userItem.classList.add('online');
        } else {
            userItem.classList.remove('online');
            userItem.classList.add('offline');
        }

        statusBadge.className = `status-badge badge ${isOnline ? 'badge-success' : 'badge-danger'} d-inline-flex align-items-center px-3 py-2`;
        statusBadge.innerHTML = `
            <span class="status-dot ${isOnline ? 'online' : 'offline'} mr-2"></span>
            ${isOnline ? 'En línea' : 'Desconectado'}
        `;

        if (usersData[userId]) {
            usersData[userId].isOnline = isOnline;
        }
    }

    function createUserItem(user, isOnline) {
        const li = document.createElement('li');
        li.className = `list-group-item user-item d-flex justify-content-between align-items-center ${isOnline ? '' : 'text-muted'}`;
        li.id = `user-item-${user.id}`;

        const chatUrl = "{% url 'chat_room' 999999 %}".replace('999999', user.id);

        const avatarHtml = user.avatarUrl
            ? `<img src="${user.avatarUrl}" alt="Avatar de ${user.name}" style="width:100%; height:100%; object-fit:cover;">`
            : `<i class="fas fa-user" aria-hidden="true"></i><span class="sr-only">Usuario</span>`;

        li.innerHTML = `
            <div class="d-flex align-items-center">
                <div class="rounded-circle bg-primary text-white d-inline-flex align-items-center justify-content-center mr-3 shadow-sm overflow-hidden flex-shrink-0" style="width: 42px; height: 42px; font-weight: 600;">
                    ${avatarHtml}
                </div>
                <a href="${chatUrl}" class="font-weight-bold text-dark">${user.name}</a>
            </div>
            <span class="status-badge badge ${isOnline ? 'badge-success' : 'badge-danger'} d-inline-flex align-items-center px-3 py-2" id="status-${user.id}">
                <span class="status-dot ${isOnline ? 'online' : 'offline'} mr-2"></span>
                ${isOnline ? 'En línea' : 'Desconectado'}
            </span>
        `;
        return li;
    }

    function renderUsersList() {
        const usersList = document.getElementById('usersList');
        const onlineUsers = [], offlineUsers = [];
        const searchValue = (document.getElementById('userSearchInput')?.value || '').trim().toLowerCase();

        Object.values(usersData).forEach(user => {
            const matchesSearch = !searchValue || user.name.toLowerCase().includes(searchValue);
            const matchesFilter = currentFilter === 'all'
                || (currentFilter === 'online' && user.isOnline)
                || (currentFilter === 'offline' && !user.isOnline);

            if (!matchesSearch || !matchesFilter) {
                return;
            }

            if (user.isOnline) onlineUsers.push(user);
            else offlineUsers.push(user);
        });

        onlineUsers.sort((a,b)=>a.name.localeCompare(b.name));
        offlineUsers.sort((a,b)=>a.name.localeCompare(b.name));

        usersList.innerHTML = '';

        if (onlineUsers.length > 0) {
            const onlineHeader = document.createElement('li');
            onlineHeader.className = 'list-group-item bg-light font-weight-bold text-success';
            onlineHeader.innerHTML = `<i class="fas fa-circle mr-2"></i>En línea (${onlineUsers.length})`;
            usersList.appendChild(onlineHeader);
            onlineUsers.forEach(user => usersList.appendChild(createUserItem(user, true)));
        }

        if (offlineUsers.length > 0) {
            const offlineHeader = document.createElement('li');
            offlineHeader.className = 'list-group-item bg-light font-weight-bold text-danger';
            offlineHeader.innerHTML = `<i class="fas fa-circle mr-2"></i>Desconectados (${offlineUsers.length})`;
            usersList.appendChild(offlineHeader);
            offlineUsers.forEach(user => usersList.appendChild(createUserItem(user, false)));
        }

        if (onlineUsers.length === 0 && offlineUsers.length === 0) {
            const emptyState = document.createElement('li');
            emptyState.className = 'list-group-item text-center py-5 text-muted empty-users';
            emptyState.innerHTML = `
                <i class="fas fa-user-slash fa-3x mb-3 text-secondary"></i>
                <h5>No hay usuarios disponibles</h5>
                <p class="mb-0">No se encontraron usuarios para chatear</p>
            `;
            usersList.appendChild(emptyState);
        }
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('[data-filter]').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.filter === filter);
        });
        renderUsersList();
    }

    function actualizarEstados() {
        fetch("{% url 'chat_home' %}?json=1", { headers: {'X-Requested-With':'XMLHttpRequest'} })
        .then(resp=>resp.json())
        .then(data=>{
            let cambios = false;
            Object.keys(data).forEach(userId=>{
                const newStatus = data[userId];
                const currentStatus = usersData[userId]?.isOnline;
                if(currentStatus !== newStatus){
                    updateUserStatus(parseInt(userId), newStatus);
                    cambios = true;
                }
            });
            if(cambios) renderUsersList();
        })
        .catch(err=>console.error(err));
    }

    function enviarPing() {
        fetch("{% url 'ping' %}", {
            method: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}",
                "Content-Type": "application/json"
            }
        }).catch(err=>console.error(err));
    }

    renderUsersList();

    const searchInput = document.getElementById('userSearchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');

    if (searchInput) {
        searchInput.addEventListener('input', renderUsersList);
    }

    if (clearSearchBtn) {
        clearSearchBtn.addEventListener('click', function() {
            if (searchInput) searchInput.value = '';
            renderUsersList();
            if (searchInput) searchInput.focus();
        });
    }

    document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.addEventListener('click', function() {
            setFilter(this.dataset.filter);
        });
    });

    setInterval(actualizarEstados, 2000);
    setInterval(enviarPing, 2000);
    enviarPing();

    const usersList = document.getElementById('usersList');
    if (usersList) {
        usersList.addEventListener('wheel', function(e) {
            if (usersList.scrollHeight > usersList.clientHeight) {
                e.stopPropagation();
            }
        }, { passive: true });
    }
</script>

{% endblock content %}
