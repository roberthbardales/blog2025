{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      }
    </script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#dbeafe_0%,_#f8fafc_42%,_#e2e8f0_100%)] font-inter text-slate-900">
    <main class="flex min-h-screen items-center justify-center px-4 py-10">
        <section class="w-full max-w-md overflow-hidden rounded-3xl border border-white/70 bg-white/90 p-8 shadow-[0_20px_60px_rgba(15,23,42,0.12)] backdrop-blur">
            <div class="mb-8 text-center">
                <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-emerald-600 text-white shadow-lg shadow-emerald-600/30">
                    <i class="fas fa-user-plus text-xl"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight">Crear cuenta</h1>
                <p class="mt-2 text-sm text-slate-500">Regístrate para empezar a chatear</p>
            </div>

            <form method="post" class="space-y-5">
                {% csrf_token %}
                {% for field in form %}
                    <div>
                        <label class="mb-2 block text-sm font-semibold text-slate-700">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}
                            <p class="mt-2 text-xs text-slate-500">{{ field.help_text }}</p>
                        {% endif %}
                        {% if field.errors %}
                            <div class="mt-2 text-sm text-red-600">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="flex w-full items-center justify-center rounded-2xl bg-emerald-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-emerald-700 focus:outline-none focus:ring-4 focus:ring-emerald-200">
                    Registrarse
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-500">
                ¿Ya tienes cuenta?
                <a href="{% url 'login' %}" class="font-semibold text-emerald-600 hover:text-emerald-700">Inicia sesión</a>
            </p>
        </section>
    </main>

    <script>
      document.querySelectorAll('input').forEach((input) => {
        input.classList.add(
          'w-full',
          'rounded-2xl',
          'border',
          'border-slate-200',
          'bg-white',
          'px-4',
          'py-3',
          'text-sm',
          'text-slate-900',
          'outline-none',
          'transition',
          'placeholder:text-slate-400',
          'focus:border-emerald-500',
          'focus:ring-4',
          'focus:ring-emerald-100'
        );
      });
    </script>
</body>
</html>
