{% extends "users/base_users.html" %}
{% load static %}

{% block content %}

{% include "includes/header.html" %}

<div class="min-h-[637px] flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">
    <div class="bg-blue-600 rounded-xl shadow-lg px-6 py-6">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h5 class="text-2xl font-bold mb-6 text-center text-white">Cambiar Password</h5>

        <p class="text-white/90 mb-4">Usuario: {{ user.email }}</p>

        {{ form.as_p }}

        <div class="text-center px-2 py-3">
          <button type="submit" class="w-full bg-yellow-500 text-white font-semibold px-4 py-2.5 rounded-lg hover:bg-yellow-600 transition-colors">
            Cambiar Contraseña
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock content %}
