{% extends "layout_sidebar.html" %}
{% load static %}

{% block sidebar_content %}
<div class="bg-white rounded-2xl shadow-[0_16px_32px_rgba(15,23,42,.12)] overflow-hidden">
  <div class="bg-gradient-to-r from-slate-900 via-blue-600 to-blue-700 text-white px-4 py-3 flex justify-between items-center">
    <div>
      <h4 class="mb-0">Editar grupo</h4>
      <small class="text-white/60">Actualiza el nombre y la descripción</small>
    </div>
    <a href="{% url 'favoritos_app:grupos_crud' %}" class="bg-white text-gray-800 px-3 py-1.5 rounded-lg text-sm hover:bg-gray-100 transition-colors no-underline">
      <i class="fas fa-arrow-left mr-1"></i>Volver
    </a>
  </div>

  <div class="p-5">
    <form method="post">
      {% csrf_token %}
      <div class="flex flex-wrap -mx-3">
        <div class="w-full md:w-1/2 px-3 mb-3">
          <label for="id_name" class="block text-sm font-medium text-gray-700 mb-1">Nombre del grupo</label>
          <input type="text" value="{{ object.name }}" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" name="name" id="id_name" required>
        </div>
        <div class="w-full md:w-1/2 px-3 mb-3">
          <label for="id_description" class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
          <textarea class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" name="description" id="id_description" rows="4" required>{{ object.description }}</textarea>
        </div>
        <div class="w-full flex justify-end px-3" style="gap: .5rem;">
          <a href="{% url 'favoritos_app:grupos_crud' %}" class="border border-gray-400 text-gray-700 px-4 py-2 rounded-xl hover:bg-gray-100 transition-colors no-underline">Cancelar</a>
          <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-xl hover:bg-blue-700 transition-colors">
            <i class="fas fa-save mr-1"></i>Guardar
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock sidebar_content %}
