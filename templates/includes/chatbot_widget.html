<div id="blog-chatbot" class="blog-chatbot">
  <button id="blog-chatbot-toggle" class="blog-chatbot-toggle" type="button">Chat</button>
  <div id="blog-chatbot-panel" class="blog-chatbot-panel d-none">
    <div class="blog-chatbot-header">
      <strong>Asistente del blog</strong>
      <button id="blog-chatbot-close" type="button" class="blog-chatbot-close">x</button>
    </div>
    <div id="blog-chatbot-messages" class="blog-chatbot-messages"></div>
    <form id="blog-chatbot-form" class="blog-chatbot-form">
      <input id="blog-chatbot-input" type="text" placeholder="Escribe tu pregunta..." autocomplete="off">
      <button type="submit">Enviar</button>
    </form>
  </div>
</div>
