{% extends "users/base_users.html" %}
{% load static %}

{% block content %}
{% include "includes/header.html" %}

<div class="mx-auto flex max-w-6xl flex-col lg:flex-row gap-6 px-4">
{% include "includes/barra_lateral.html" %}

<div class="w-full lg:flex-1 py-4 min-h-[calc(100vh-140px)]">
    <div class="mx-auto max-w-[550px] py-6">
        <div class="mb-4 overflow-hidden rounded-2xl bg-white shadow-[0_10px_24px_rgba(15,23,42,.08)]">
            <div class="flex flex-col gap-3 p-4 sm:flex-row sm:items-center sm:justify-between">
                <div class="flex gap-2">
                    <button type="button" class="inline-flex items-center gap-1.5 rounded-full border border-emerald-300 bg-emerald-50 px-4 py-2 text-xs font-semibold text-emerald-700 transition hover:bg-emerald-100" data-filter="online">
                        <i class="fas fa-circle text-[8px]"></i>En línea
                    </button>
                    <button type="button" class="inline-flex items-center gap-1.5 rounded-full border border-slate-300 bg-slate-50 px-4 py-2 text-xs font-semibold text-slate-600 transition hover:bg-slate-100" data-filter="offline">
                        <i class="fas fa-user-clock text-[10px]"></i>Offline
                    </button>
                </div>

                <form class="w-full max-w-[200px]" onsubmit="return false;">
                    <div class="flex">
                        <input type="text"
                               class="w-full rounded-l-full border border-r-0 border-slate-300 bg-white px-4 py-2 text-sm text-slate-700 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                               placeholder="Buscar..."
                               id="userSearchInput"
                               autocomplete="off">
                        <button class="rounded-r-full bg-blue-600 px-4 py-2 text-xs font-semibold text-white transition hover:bg-blue-700" type="button" id="clearSearchBtn">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="overflow-hidden rounded-2xl shadow-[0_10px_24px_rgba(15,23,42,.10)] transition hover:-translate-y-0.5 hover:shadow-[0_15px_30px_rgba(15,23,42,.15)]">
            <div class="flex items-center justify-between bg-gradient-to-r from-blue-800 to-blue-600 px-4 py-3 text-white">
                <div>
                    <h3 class="text-sm font-bold"><i class="fas fa-users mr-2"></i>Usuarios</h3>
                    <p class="text-xs text-white/70">Selecciona con quién quieres conversar</p>
                </div>
                <span class="rounded-full bg-white/20 px-3 py-1 text-xs font-semibold text-white">Chat activo</span>
            </div>
            <div class="max-h-[calc(100vh-260px)] min-h-[300px] overflow-y-auto bg-white" id="usersListWrapper">
                <ul class="divide-y divide-slate-100" id="usersList">
                </ul>
            </div>
        </div>
    </div>
</div>
</div>

<script>
    const usersData = {
        {% for u in users %}
        {% if u.id != user.id %}
        {{ u.id }}: {
            id: {{ u.id }},
            name: "{{ u.full_name }}",
            initial: "{{ u.full_name|slice:':1'|upper }}",
            avatarUrl: "{% if u.avatar %}{{ u.avatar.url }}{% elif u.avatar_url %}{{ u.avatar_url }}{% endif %}",
            isOnline: {% if u.is_online %}true{% else %}false{% endif %}
        },
        {% endif %}
        {% endfor %}
    };

    let currentFilter = 'all';

    function updateUserStatus(userId, isOnline) {
        const userItem = document.getElementById(`user-item-${userId}`);
        const statusBadge = document.getElementById(`status-${userId}`);
        if (!userItem || !statusBadge) return;

        if (isOnline) {
            userItem.dataset.status = 'online';
        } else {
            userItem.dataset.status = 'offline';
        }

        statusBadge.className = `inline-flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-semibold ${isOnline ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-100 text-slate-500'}`;
        statusBadge.innerHTML = `
            <span class="h-2 w-2 rounded-full ${isOnline ? 'bg-emerald-500' : 'bg-slate-400'}"></span>
            ${isOnline ? 'En línea' : 'Desconectado'}
        `;

        if (usersData[userId]) {
            usersData[userId].isOnline = isOnline;
        }
    }

    function createUserItem(user, isOnline) {
        const li = document.createElement('li');
        li.className = `flex items-center justify-between px-4 py-3 transition hover:bg-slate-50 hover:pl-5 hover:shadow-[inset_3px_0_0_rgba(37,99,235,.25)] ${isOnline ? '' : 'text-slate-400'}`;
        li.id = `user-item-${user.id}`;
        li.dataset.status = isOnline ? 'online' : 'offline';

        const chatUrl = "{% url 'chat_room' 999999 %}".replace('999999', user.id);

        const avatarHtml = user.avatarUrl
            ? `<img src="${user.avatarUrl}" alt="Avatar de ${user.name}" class="h-full w-full object-cover">`
            : `<i class="fas fa-user text-sm text-white/80"></i>`;

        li.innerHTML = `
            <div class="flex items-center gap-3">
                <div class="flex h-[42px] w-[42px] shrink-0 items-center justify-center overflow-hidden rounded-full bg-blue-600 text-sm font-semibold text-white shadow-sm">
                    ${avatarHtml}
                </div>
                <a href="${chatUrl}" class="text-sm font-semibold text-slate-900 hover:text-blue-600">${user.name}</a>
            </div>
            <span class="inline-flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-semibold ${isOnline ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-100 text-slate-500'}" id="status-${user.id}">
                <span class="h-2 w-2 rounded-full ${isOnline ? 'bg-emerald-500' : 'bg-slate-400'}"></span>
                ${isOnline ? 'En línea' : 'Desconectado'}
            </span>
        `;
        return li;
    }

    function renderUsersList() {
        const usersList = document.getElementById('usersList');
        const onlineUsers = [], offlineUsers = [];
        const searchValue = (document.getElementById('userSearchInput')?.value || '').trim().toLowerCase();

        Object.values(usersData).forEach(user => {
            const matchesSearch = !searchValue || user.name.toLowerCase().includes(searchValue);
            const matchesFilter = currentFilter === 'all'
                || (currentFilter === 'online' && user.isOnline)
                || (currentFilter === 'offline' && !user.isOnline);

            if (!matchesSearch || !matchesFilter) return;

            if (user.isOnline) onlineUsers.push(user);
            else offlineUsers.push(user);
        });

        onlineUsers.sort((a,b)=>a.name.localeCompare(b.name));
        offlineUsers.sort((a,b)=>a.name.localeCompare(b.name));

        usersList.innerHTML = '';

        if (onlineUsers.length > 0) {
            const onlineHeader = document.createElement('li');
            onlineHeader.className = 'bg-emerald-50 px-4 py-2 text-xs font-bold text-emerald-700';
            onlineHeader.innerHTML = `<i class="fas fa-circle mr-2 text-[8px] text-emerald-500"></i>En línea (${onlineUsers.length})`;
            usersList.appendChild(onlineHeader);
            onlineUsers.forEach(user => usersList.appendChild(createUserItem(user, true)));
        }

        if (offlineUsers.length > 0) {
            const offlineHeader = document.createElement('li');
            offlineHeader.className = 'bg-slate-50 px-4 py-2 text-xs font-bold text-slate-500';
            offlineHeader.innerHTML = `<i class="fas fa-circle mr-2 text-[8px] text-slate-400"></i>Desconectados (${offlineUsers.length})`;
            usersList.appendChild(offlineHeader);
            offlineUsers.forEach(user => usersList.appendChild(createUserItem(user, false)));
        }

        if (onlineUsers.length === 0 && offlineUsers.length === 0) {
            const emptyState = document.createElement('li');
            emptyState.className = 'py-12 text-center';
            emptyState.innerHTML = `
                <div class="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-full bg-slate-100">
                    <i class="fas fa-user-slash text-xl text-slate-400"></i>
                </div>
                <h5 class="text-sm font-semibold text-slate-900">No hay usuarios disponibles</h5>
                <p class="mt-1 text-xs text-slate-500">No se encontraron usuarios para chatear</p>
            `;
            usersList.appendChild(emptyState);
        }
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('[data-filter]').forEach(btn => {
            if (btn.dataset.filter === filter) {
                btn.classList.add('ring-2', 'ring-blue-400');
            } else {
                btn.classList.remove('ring-2', 'ring-blue-400');
            }
        });
        renderUsersList();
    }

    function actualizarEstados() {
        fetch("{% url 'chat_home' %}?json=1", { headers: {'X-Requested-With':'XMLHttpRequest'} })
        .then(resp=>resp.json())
        .then(data=>{
            let cambios = false;
            Object.keys(data).forEach(userId=>{
                const newStatus = data[userId];
                const currentStatus = usersData[userId]?.isOnline;
                if(currentStatus !== newStatus){
                    updateUserStatus(parseInt(userId), newStatus);
                    cambios = true;
                }
            });
            if(cambios) renderUsersList();
        })
        .catch(err=>console.error(err));
    }

    function enviarPing() {
        fetch("{% url 'ping' %}", {
            method: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}",
                "Content-Type": "application/json"
            }
        }).catch(err=>console.error(err));
    }

    renderUsersList();

    const searchInput = document.getElementById('userSearchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');

    if (searchInput) {
        searchInput.addEventListener('input', renderUsersList);
    }

    if (clearSearchBtn) {
        clearSearchBtn.addEventListener('click', function() {
            if (searchInput) searchInput.value = '';
            renderUsersList();
            if (searchInput) searchInput.focus();
        });
    }

    document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.addEventListener('click', function() {
            setFilter(this.dataset.filter);
        });
    });

    setInterval(actualizarEstados, 2000);
    setInterval(enviarPing, 2000);
    enviarPing();

    const usersList = document.getElementById('usersList');
    if (usersList) {
        usersList.addEventListener('wheel', function(e) {
            if (usersList.scrollHeight > usersList.clientHeight) {
                e.stopPropagation();
            }
        }, { passive: true });
    }
</script>

{% endblock content %}
